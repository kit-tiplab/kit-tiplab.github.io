baseURL = "https://tip.cs.kitami-it.ac.jp/"
title = "TiP Lab"
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
pagination.pagerSize = 20

[markup.goldmark.renderer]
  unsafe = true

[languages]
