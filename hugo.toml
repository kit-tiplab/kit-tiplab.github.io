    [[languages.ja.menus.main]]
      name = "研究成果"
      url = "/publications/"
      weight = 4
    [[languages.ja.menus.main]]
      name = "留学生の方へ"
      url = "/international/"
      weight = 5
    [[languages.ja.menus.main]]
      name = "ニュース"
