    label = "日本語"
    weight = 1
    contentDir = "content/ja"
    [languages.ja.params]
      description = "北見工業大学 テキスト情報処理研究室（TiP Lab）— 自然言語処理・有害情報検出・感情分析・観光情報学・カーリング情報学"
